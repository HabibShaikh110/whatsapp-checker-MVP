<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Checker - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
      text-align: center;
    }
    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
      text-align: center;
    }
    .form-container {
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 5px;
      display: none;
      padding: 8px 10px;
      background: #fadbd8;
      border-radius: 4px;
    }
    .success {
      color: #27ae60;
      font-size: 12px;
      margin-top: 5px;
      display: none;
      padding: 8px 10px;
      background: #d5f4e6;
      border-radius: 4px;
    }
    .toggle-form {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }
    .toggle-form button {
      background: none;
      color: #667eea;
      padding: 0;
      margin: 0;
      transform: none;
      font-weight: 600;
      cursor: pointer;
    }
    .toggle-form button:hover {
      text-decoration: underline;
    }
    .user-info {
      display: none;
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .user-info p {
      color: #333;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .user-info .email {
      background: #f5f5f5;
      padding: 10px 12px;
      border-radius: 4px;
      word-break: break-all;
      font-family: monospace;
      margin-bottom: 15px;
    }
    .btn-app {
      background: #667eea;
      width: 100%;
      margin-bottom: 5px;
      display: block;
    }
    .btn-logout {
      background: #e74c3c;
      width: 100%;
    }
    .btn-logout:hover {
      background: #c0392b;
    }
    .loading {
      display: none;
      text-align: center;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✓ WhatsApp Checker</h1>
    <p>Sign in to check numbers</p>
    
    <div id="auth-section">
      <!-- Sign In Form -->
      <div id="signin-form" class="form-container">
        <h2 style="font-size: 18px; color: #333; margin-bottom: 20px;">Sign In</h2>
        <div class="form-group">
          <label for="signin-email">Email</label>
          <input 
            type="email" 
            id="signin-email" 
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="signin-password">Password</label>
          <input 
            type="password" 
            id="signin-password" 
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <div class="error" id="signin-error"></div>
        <div class="success" id="signin-success"></div>
        <button onclick="handleSignIn()" id="signin-btn">Sign In</button>
        <div class="toggle-form">
          Don't have an account? <button onclick="toggleForm()">Sign Up</button>
        </div>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-form" class="form-container" style="display: none;">
        <h2 style="font-size: 18px; color: #333; margin-bottom: 20px;">Create Account</h2>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input 
            type="email" 
            id="signup-email" 
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input 
            type="password" 
            id="signup-password" 
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input 
            type="password" 
            id="signup-confirm" 
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="error" id="signup-error"></div>
        <div class="success" id="signup-success"></div>
        <button onclick="handleSignUp()" id="signup-btn">Sign Up</button>
        <div class="toggle-form">
          Already have an account? <button onclick="toggleForm()">Sign In</button>
        </div>
      </div>
    </div>

    <div class="user-info" id="user-info">
      <p><strong>✅ Logged in!</strong></p>
      <p>Email:</p>
      <div class="email" id="user-email">-</div>
      <button class="btn-app" onclick="goToApp()">Go to App →</button>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <script>
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function hideError(elementId) {
      const errorEl = document.getElementById(elementId);
      errorEl.style.display = "none";
    }

    function showSuccess(elementId, message) {
      const successEl = document.getElementById(elementId);
      successEl.textContent = message;
      successEl.style.display = "block";
    }

    function toggleForm() {
      const signinForm = document.getElementById("signin-form");
      const signupForm = document.getElementById("signup-form");
      
      signinForm.style.display = signinForm.style.display === "none" ? "block" : "none";
      signupForm.style.display = signupForm.style.display === "none" ? "block" : "none";
      
      // Clear errors
      hideError("signin-error");
      hideError("signup-error");
    }

    async function handleSignUp() {
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirm = document.getElementById("signup-confirm").value;
      const btn = document.getElementById("signup-btn");

      hideError("signup-error");

      if (!isValidEmail(email)) {
        showError("signup-error", "Invalid email format");
        return;
      }

      if (password.length < 8) {
        showError("signup-error", "Password must be at least 8 characters");
        return;
      }

      if (password !== confirm) {
        showError("signup-error", "Passwords don't match");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating account...";

      try {
        const response = await fetch("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError("signup-error", data.error || "Sign up failed");
          btn.disabled = false;
          btn.textContent = "Sign Up";
          return;
        }

        // Sign up successful, auto sign in
        const signinResponse = await fetch("/auth/signin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const signinData = await signinResponse.json();

        if (signinResponse.ok) {
          localStorage.setItem("clerk_token", signinData.token);
          localStorage.setItem("user_email", email);
          showSuccess("signup-success", "Account created! Redirecting...");
          setTimeout(() => location.reload(), 1500);
        }
      } catch (err) {
        showError("signup-error", "Network error. Try again.");
        btn.disabled = false;
        btn.textContent = "Sign Up";
      }
    }

    async function handleSignIn() {
      const email = document.getElementById("signin-email").value.trim();
      const password = document.getElementById("signin-password").value;
      const btn = document.getElementById("signin-btn");

      hideError("signin-error");

      if (!isValidEmail(email)) {
        showError("signin-error", "Invalid email format");
        return;
      }

      if (!password) {
        showError("signin-error", "Password required");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      try {
        const response = await fetch("/auth/signin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError("signin-error", data.error || "Sign in failed");
          btn.disabled = false;
          btn.textContent = "Sign In";
          return;
        }

        localStorage.setItem("clerk_token", data.token);
        localStorage.setItem("user_email", email);
        showSuccess("signin-success", "Signed in! Redirecting...");
        setTimeout(() => location.reload(), 1500);
      } catch (err) {
        showError("signin-error", "Network error. Try again.");
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }

    function handleLogout() {
      localStorage.removeItem("clerk_token");
      localStorage.removeItem("user_email");
      location.reload();
    }

    function goToApp() {
      window.location.href = "/index.html";
    }

    function checkAuth() {
      const token = localStorage.getItem("clerk_token");
      const email = localStorage.getItem("user_email");
      
      if (token && email) {
        document.getElementById("auth-section").style.display = "none";
        document.getElementById("user-info").style.display = "block";
        document.getElementById("user-email").textContent = email;
      }
    }

    document.addEventListener("DOMContentLoaded", checkAuth);

    // Allow Enter key
    document.getElementById("signin-password")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleSignIn();
    });
    document.getElementById("signup-confirm")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleSignUp();
    });
  </script>
</body>
</html>
